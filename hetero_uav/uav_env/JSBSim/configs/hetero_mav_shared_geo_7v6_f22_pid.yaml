  red_4: {lon: 119.97, lat: 59.98, altitude_m: 6000, speed_mps: 250, yaw_deg: 0.0}
  red_5: {lon: 120.00, lat: 59.98, altitude_m: 6000, speed_mps: 250, yaw_deg: 0.0}
  red_6: {lon: 120.03, lat: 59.98, altitude_m: 6000, speed_mps: 250, yaw_deg: 0.0}
  blue_0: {lon: 119.96, lat: 60.15, altitude_m: 6000, speed_mps: 250, yaw_deg: 180.0}
  blue_1: {lon: 120.00, lat: 60.15, altitude_m: 6000, speed_mps: 250, yaw_deg: 180.0}
  blue_2: {lon: 120.04, lat: 60.15, altitude_m: 6000, speed_mps: 250, yaw_deg: 180.0}
