  red_1: {lon: 119.97, lat: 60.02, altitude_m: 6000, speed_mps: 250, yaw_deg: 0.0}
  red_2: {lon: 120.00, lat: 60.02, altitude_m: 6000, speed_mps: 250, yaw_deg: 0.0}
