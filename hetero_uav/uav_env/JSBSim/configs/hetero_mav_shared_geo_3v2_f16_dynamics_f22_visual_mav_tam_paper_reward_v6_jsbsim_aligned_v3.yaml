# MAIN EXPERIMENT CONFIG - 3v2
# MAV uses F16 dynamics, F22 ACMI visual label. All PID = f16_default.
action_trim_by_role:
  mav: {heading: 0.0, pitch: 0.0, speed: 0.0}
agent_interaction_steps: 12
aircraft_type_params:
  attack_uav:  {aircraft_model: f16, role: attack_uav,  num_missiles: 2}
  interceptor_uav: {aircraft_model: f16, role: interceptor_uav, num_missiles: 2}
  mav:          {aircraft_model: f16, role: mav, num_missiles: 0}
  scout_uav:    {aircraft_model: f16, role: scout_uav, num_missiles: 0}
blue_agent_types: [attack_uav, attack_uav]
enable_gcas_for_blue: true
env_type: jsbsim_hetero
hetero_reward_mode: tam_paper_reward_v6_jsbsim_aligned_v3
tam_paper_reward_v6_jsbsim_aligned_v3:
  global_scale: 1.0
  flight_status:
    pitch_weight: 0.01
    roll_weight: 0.002
    altitude_weight: 0.04
    speed_weight: 0.02
    boundary_weight: 0.04
    boundary_raw_penalty: -10.0
    use_env_constants: true
    altitude_mode: penalty_only
    speed_mode: low_speed_penalty_only
    use_one_shot_out_of_zone_event: false
  situation:
    weight: 0.15
    enemy_threat_weight: 0.8
    normalize_by_alive_blue: true
    active_distance_ref_m: null
    min_range_m: null
    optimal_min_m: null
    optimal_max_m: null
    use_rear_factor: true
    rear_floor: 0.20
    rear_start_deg: 90.0
    rear_full_deg: 150.0
    log_td15_brma: true
    log_td10_without_rear: true
    log_td10_with_rear: true
  dodge:
    active: false
    log_only: true
  terminal:
    mode: weighted_normalized_loss_fraction_per_agent
    coef_per_agent: 30.0
    mav_loss_weight_mode: match_uav_count
    mav_loss_weight: null
    apply_once: true
    divide_by_red_initial: false
  uav:
    event:
      kill_enemy: 200.0
      death: -200.0
      out_of_zone_active: false
  mav:
    d_danger_m: 5000.0
    d_safe_m: 14000.0
    d_opt_m: 8000.0
    d_max_m: 25000.0
    safety_weights: {dist: 0.5, threat: 0.3, aspect: 0.2}
    safety_aggregation: {aspect: worst_case, aspect_angle_source: mav_threat_angle_3d_not_launch_ta}
    safety_scale: {negative: 0.20, positive: 0.05}
    support_weights: {pos: 0.6, aware: 0.4}
    support_aggregation: {aware: mean}
    support_scale: 0.10
    event:
      death_penalty: -300.0
      team_kill_credit_per_kill: 40.0
      team_kill_credit_cap_episode: 100.0
      stop_credit_after_mav_death: true
  log_only:
    dodge_components: true
    mav_information_support: true
    shared_track_usage: true
    td15_situation: true
    td10_without_rear_situation: true
    td10_with_rear_situation: true
    component_episode_sums: true
red_target_selection_mode: mav_threat_rank
initial_states:
  blue_0: {altitude_m: 6000, lat: 60.2, lon: 120.0,  speed_mps: 250, yaw_deg: 180.0}
  blue_1: {altitude_m: 6000, lat: 60.2, lon: 120.04, speed_mps: 250, yaw_deg: 180.0}
  red_0:  {altitude_m: 6500, lat: 59.98, lon: 120.02, speed_mps: 230, yaw_deg: 0.0}
  red_1:  {altitude_m: 6000, lat: 60.0,  lon: 120.0,  speed_mps: 250, yaw_deg: 0.0}
  red_2:  {altitude_m: 6000, lat: 60.0,  lon: 120.04, speed_mps: 250, yaw_deg: 0.0}
mav_observation_range_m: 80000
max_num_blue: 2
max_num_red: 3
max_steps: 1000
observation_mode: mav_shared_geo
red_agent_types: [mav, attack_uav, attack_uav]
sim_freq: 60
suppress_jsbsim_output: true
uav_direct_observation_range_m: 10000.0

pid_profile_by_role:
  mav: f16_default
  attack_uav: f16_default
  interceptor_uav: f16_default

# Visual only - ACMI rendering, no effect on simulation dynamics
acmi_visual_by_role:
  mav: f22
  attack_uav: f16
