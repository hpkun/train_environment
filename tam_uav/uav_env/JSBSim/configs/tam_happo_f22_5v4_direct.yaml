env_type: jsbsim_hetero
observation_mode: mav_shared_geo
hetero_reward_mode: happo_ref_v0
action_interface: tam_direct_fcs_4d
tam_action_distribution: multidiscrete_categorical
tam_action_levels: 40
tam_throttle_min: 0.4
tam_throttle_max: 0.9
tam_direct_fcs_calibration:
  enabled: true
  by_model:
    f22:
      throttle_bias: 0.0
      throttle_gain: 1.0
      aileron_bias: -0.02564102564102555
      aileron_gain: 1.0
      elevator_bias: -0.027
      elevator_gain: 1.0
      rudder_bias: -0.02564102564102555
      rudder_gain: 1.0
    f16:
      throttle_bias: 0.0
      throttle_gain: 1.0
      aileron_bias: 0.0
      aileron_gain: 1.0
      elevator_bias: 0.0
      elevator_gain: 1.0
      rudder_bias: 0.0
      rudder_gain: 1.0
scripted_evasion_red: false
scripted_evasion_blue: false
max_num_red: 5
max_num_blue: 4
red_agent_types:
  - mav
  - attack_uav
  - attack_uav
  - attack_uav
  - attack_uav
blue_agent_types:
  - attack_uav
  - attack_uav
  - attack_uav
  - attack_uav
aircraft_type_params:
  mav:
    aircraft_model: f22
    role: mav
    num_missiles: 0
    init_altitude_offset_m: 0.0
    init_speed_offset_mps: 0.0
  attack_uav:
    aircraft_model: f16
    role: attack_uav
    num_missiles: 2
    init_altitude_offset_m: 0.0
    init_speed_offset_mps: 0.0
sim_freq: 60
agent_interaction_steps: 12
max_steps: 1000
enable_gcas_for_blue: true
suppress_jsbsim_output: true
uav_direct_observation_range_m: 10000.0
mav_observation_range_m: 80000.0
initial_states:
  red_0: {lon: 120.00, lat: 60.00, altitude_m: 6700, speed_mps: 250, yaw_deg: 0.0}
  red_1: {lon: 119.98, lat: 60.02, altitude_m: 6000, speed_mps: 250, yaw_deg: 0.0}
  red_2: {lon: 120.02, lat: 60.02, altitude_m: 6000, speed_mps: 250, yaw_deg: 0.0}
  red_3: {lon: 119.99, lat: 59.98, altitude_m: 6000, speed_mps: 250, yaw_deg: 0.0}
  red_4: {lon: 120.01, lat: 59.98, altitude_m: 6000, speed_mps: 250, yaw_deg: 0.0}
  blue_0: {lon: 119.98, lat: 60.15, altitude_m: 6000, speed_mps: 250, yaw_deg: 180.0}
  blue_1: {lon: 120.02, lat: 60.15, altitude_m: 6000, speed_mps: 250, yaw_deg: 180.0}
  blue_2: {lon: 119.99, lat: 60.19, altitude_m: 6000, speed_mps: 250, yaw_deg: 180.0}
  blue_3: {lon: 120.01, lat: 60.19, altitude_m: 6000, speed_mps: 250, yaw_deg: 180.0}


airborne_initial_state_stabilization:
  enabled: true
  mode: engine_warm_recenter
  apply_to_models:
  - f22
  - f16
  warmup_seconds: 35.0
  recenter_after_warmup: true
  restore_initial_geodetic: true
  restore_initial_attitude: true
  restore_initial_velocity: true
  fcs_command:
    throttle_cmd_norm: 0.9
    throttle_pos_norm: 0.9
    aileron_cmd_norm: 0.0
    elevator_cmd_norm: 0.0
    rudder_cmd_norm: 0.0
  validation:
    min_speed_mps_after_reset: 180.0
    max_position_drift_m: 50.0
    max_altitude_drift_m: 50.0
    max_heading_drift_deg: 2.0

tam_paper_mode: true
control_mode_by_role:
  mav: direct_fcs_3d
  attack_uav: direct_fcs_3d
